<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- 水滴主体：高明度、高饱和的三段式流体渐变，无论在深色还是浅色背景下都非常醒目 -->
    <linearGradient id="dropGrad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#38E5FF" />   <!-- 亮青色 -->
      <stop offset="50%" stop-color="#0072FF" />   <!-- 纯正蓝 -->
      <stop offset="100%" stop-color="#0A2B8A" />  <!-- 深海蓝 -->
    </linearGradient>
  </defs>

  <g>
    <!-- 1. 水滴主轮廓 
         精确计算：顶部 Y=20，底部 Y=480，高度正好为 460px (满足上下 padding 20px)。
         左侧极值 X=90，右侧极值 X=410，宽度 320px，完美居中。 -->
    <path d="M 250 20 
             C 220 100, 90 200, 90 320 
             A 160 160 0 0 0 410 320 
             C 410 200, 280 100, 250 20 Z" 
          fill="url(#dropGrad)" />

    <!-- 2. 左侧主高光 (月牙形光泽)
         贴合水滴左侧边缘的锐利反光，呈现出高级的 3D 玻璃透视质感 -->
    <path d="M 235 60 
             C 190 120, 110 220, 110 320 
             A 140 140 0 0 0 150 420 
             C 120 340, 190 160, 235 60 Z" 
          fill="#FFFFFF" opacity="0.45" />
          
    <!-- 3. 右下方边缘折射光
         极简的微弱反光，用于增强底部浑圆的体积感，避免纯平面的死板 -->
    <path d="M 330 455 
             A 150 150 0 0 0 400 340 
             C 385 390, 360 435, 330 455 Z" 
          fill="#FFFFFF" opacity="0.2" />
  </g>
</svg>